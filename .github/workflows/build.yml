# ===========================================
# ФАЙЛ: .github/workflows/build.yml
# Назначение: автоматическая сборка exe
# Запускается при пуше в ветку main
# или вручную через кнопку Run workflow
# Результат: exe файл в разделе Artifacts
# ===========================================

name: Build Server Manager

on:
  push:
    branches: [ main ]
    paths:
      - 'tools/server-manager/**'
  # Ручной запуск через кнопку в Actions
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      # Шаг 1 — Получаем код
      - name: Checkout
        uses: actions/checkout@v4

      # Шаг 2 — Устанавливаем Python
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # Шаг 3 — Устанавливаем зависимости
      - name: Install dependencies
        working-directory: tools/server-manager
        run: pip install -r requirements.txt

      # Шаг 4 — Собираем exe
      - name: Build exe
        working-directory: tools/server-manager
        run: |
          pyinstaller --onefile --windowed --name "MinetestManager" main.py

      # Шаг 5 — Публикуем exe как артефакт
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: MinetestManager
          path: tools/server-manager/dist/MinetestManager.exe
