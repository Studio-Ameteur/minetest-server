
# Конфигурация сервера Minetest / Luanti


# --- Основные настройки сервера ---
server_name = Minetest Server
server_description = Игровой сервер с VIP-системой
server_address = 0.0.0.0
port = 30000
max_users = 50

# --- Авторизация ---
# Отключаем стандартную авторизацию Minetest
# Авторизация осуществляется через Lua-мод auth_laravel
disallow_empty_password = true
enable_registration = false

# --- Производительность ---
# Дальность прогрузки чанков (чем меньше - тем меньше нагрузка)
max_block_send_distance = 8
max_block_generate_distance = 6
active_block_range = 3

# Ограничение FPS сервера
dedicated_server_step = 0.05

# Количество потоков генерации мира
num_emerge_threads = 2

# --- Моды ---
# Подключаем только необходимые моды
enable_mod_auth_laravel = true
enable_mod_vip_system = true

# --- Логирование ---
debug_log_level = action
log_max_size = 50

# --- Безопасность ---
# Разрешаем Lua-модам делать HTTP-запросы (нужно для Laravel API)
secure.trusted_mods = auth_laravel, vip_system
secure.http_mods = auth_laravel, vip_system

# --- Laravel API ---
# Базовый URL Laravel API (заменить на реальный)
laravel_api_url = https://your-domain.com/api
laravel_server_token = REPLACE_WITH_YOUR_TOKEN
