# ===========================================
# ФАЙЛ: mod.conf
# Назначение: метаданные мода vip_system
# Обязателен для загрузки мода сервером
# ===========================================

# Название мода (должно совпадать с названием папки)
name = vip_system

# Описание мода
description = Система VIP-статусов и привилегий с синхронизацией через Laravel API

# Минимальная версия Minetest
min_minetest_version = 5.0

# Зависимости — auth_laravel должен загрузиться первым
depends = auth_laravel

# Необязательные зависимости
optional_depends =
